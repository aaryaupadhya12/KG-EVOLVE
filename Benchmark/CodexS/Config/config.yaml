import:
- reciprocal_relations_model
- complex

model: reciprocal_relations_model

dataset:
  name: codex-s
  num_entities: 2034
  num_relations: 42

reciprocal_relations_model:
  base_model:
    type: complex

lookup_embedder:
  dim: 512
  initialize: xavier_normal_
  initialize_args:
    xavier_normal_:
      gain: 1.0
    xavier_uniform_:
      gain: 1.0
    normal_:
      mean: 0.0
      std: 0.0003706650808601012
    uniform_:
      a: -0.2092997908254619
  regularize: ''
  regularize_args:
    weighted: true

complex:
  entity_embedder:
    dropout: 0.07931799348443747
    regularize_weight: 9.584175626202284e-13
  relation_embedder:
    dropout: 0.05643956921994686
    regularize_weight: 0.022858621200283015

train:
  type: 1vsAll
  auto_correct: true
  batch_size: 1024
  max_epochs: 400
  optimizer: Adam
  optimizer_args:
    lr: 0.00033858206813454155
  loss_arg: .nan
  lr_scheduler: ReduceLROnPlateau
  lr_scheduler_args:
    factor: 0.95
    mode: max
    patience: 7
    threshold: 0.0001

valid:
  early_stopping:
    patience: 10
    threshold:
      epochs: 50
      metric_value: 0.05

eval:
  batch_size: 256

entity_ranking:
  metrics_per:
    relation_type: true